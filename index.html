<!-- Pantalla 1 -->

    <button id="btn-yes">Sí</button>
    <button id="btn-no">No</button>
  </div>
</div>

<!-- Pantalla 2: Sorpresa -->
<div class="surprise-screen" id="surprise">
  <div class="sunflower-wrapper">

      </div>

        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
      </div>
      <div class="center"></div>
    </div>
    <div class="stem">
      <div class="leaf left"></div>
      <div class="leaf right"></div>
    </div>
    <p class="thanks-text">gracias por perdonarme 💕</p>
    <p class="small-note">en un momento te llevo a WhatsApp...</p>
  </div>
</div>

<script src="app.js"></script>

</html>
