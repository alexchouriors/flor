<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¿Me perdonas?</title>
<style>
  :root {
    --pink: #ff8fab;
    --pink-dark: #ff5d8f;
    --cream: #fff5f7;
  }

  * {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Verdana, sans-serif;
  }

  body {
    background: linear-gradient(135deg, #ffe3ec 0%, #ffd1dc 50%, #ffc2d1 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* ---------- Corazones de fondo ---------- */
  .heart {
    position: absolute;
    top: 110%;
    font-size: 1.5rem;
    color: rgba(255, 255, 255, 0.6);
    animation: floatUp linear infinite;
    pointer-events: none;
    user-select: none;
  }

  @keyframes floatUp {
    0% {
      transform: translateY(0) rotate(0deg);
      opacity: 0.8;
    }
    100% {
      transform: translateY(-120vh) rotate(360deg);
      opacity: 0;
    }
  }

  /* ---------- Pantalla 1: Tarjeta ---------- */
  .card {
    background: #ffffff;
    border-radius: 30px;
    padding: 50px 35px;
    width: 90%;
    max-width: 380px;
    text-align: center;
    box-shadow: 0 20px 50px rgba(255, 105, 145, 0.35);
    position: relative;
    z-index: 5;
    transition: opacity 0.7s ease, transform 0.7s ease;
  }

  .card.hide {
    opacity: 0;
    transform: scale(0.8) translateY(-20px);
    pointer-events: none;
  }

  .card h1 {
    font-size: 2rem;
    color: var(--pink-dark);
    margin: 0 0 10px;
    text-shadow: 1px 2px 0 rgba(255, 182, 193, 0.5);
    animation: pulseText 1.8s ease-in-out infinite;
  }

  @keyframes pulseText {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }

  .card .emoji {
    font-size: 3.5rem;
    display: block;
    margin-bottom: 10px;
    animation: bounce 1.5s ease-in-out infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .buttons-row {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin-top: 30px;
    min-height: 60px;
  }

  button {
    border: none;
    cursor: pointer;
    font-size: 1.1rem;
    font-weight: bold;
    padding: 14px 32px;
    border-radius: 50px;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    font-family: inherit;
  }

  #btn-yes {
    background: linear-gradient(135deg, #ff8fab, #ff5d8f);
    color: #fff;
    box-shadow: 0 8px 20px rgba(255, 93, 143, 0.4);
  }

  #btn-yes:hover {
    transform: scale(1.08);
    box-shadow: 0 10px 25px rgba(255, 93, 143, 0.55);
  }

  #btn-no {
    background: #f1f1f1;
    color: #777;
    position: relative;
  }

  /* Cuando el botón No escapa, se posiciona respecto al body */
  #btn-no.escaping {
    position: fixed;
    z-index: 999;
  }

  /* ---------- Pantalla 2: Sorpresa ---------- */
  .surprise-screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s ease;
    z-index: 3;
  }

  .surprise-screen.show {
    opacity: 1;
    pointer-events: auto;
  }

  /* ---------- Girasol CSS ---------- */
  .sunflower-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .sunflower {
    position: relative;
    width: 260px;
    height: 260px;
    animation: sway 4s ease-in-out infinite;
    transform-origin: bottom center;
  }

  @keyframes sway {
    0%, 100% { transform: rotate(-3deg); }
    50% { transform: rotate(3deg); }
  }

  .petals {
    position: absolute;
    width: 100%;
    height: 100%;
    animation: rotatePetals 18s linear infinite;
  }

  .petal {
    position: absolute;
    width: 50px;
    height: 90px;
    background: linear-gradient(180deg, #ffd23f, #ffb627);
    border-radius: 50% 50% 0 0 / 60% 60% 0 0;
    top: 50%;
    left: 50%;
    transform-origin: bottom center;
    animation: petalPulse 2.4s ease-in-out infinite;
    box-shadow: inset 0 -6px 8px rgba(214, 140, 10, 0.3);
  }

  @keyframes petalPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.07); }
  }

  @keyframes rotatePetals {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  /* 16 pétalos distribuidos cada 22.5deg */
  .petal:nth-child(1)  { transform: translate(-50%, -100%) rotate(0deg); }
  .petal:nth-child(2)  { transform: translate(-50%, -100%) rotate(22.5deg); }
  .petal:nth-child(3)  { transform: translate(-50%, -100%) rotate(45deg); }
  .petal:nth-child(4)  { transform: translate(-50%, -100%) rotate(67.5deg); }
  .petal:nth-child(5)  { transform: translate(-50%, -100%) rotate(90deg); }
  .petal:nth-child(6)  { transform: translate(-50%, -100%) rotate(112.5deg); }
  .petal:nth-child(7)  { transform: translate(-50%, -100%) rotate(135deg); }
  .petal:nth-child(8)  { transform: translate(-50%, -100%) rotate(157.5deg); }
  .petal:nth-child(9)  { transform: translate(-50%, -100%) rotate(180deg); }
  .petal:nth-child(10) { transform: translate(-50%, -100%) rotate(202.5deg); }
  .petal:nth-child(11) { transform: translate(-50%, -100%) rotate(225deg); }
  .petal:nth-child(12) { transform: translate(-50%, -100%) rotate(247.5deg); }
  .petal:nth-child(13) { transform: translate(-50%, -100%) rotate(270deg); }
  .petal:nth-child(14) { transform: translate(-50%, -100%) rotate(292.5deg); }
  .petal:nth-child(15) { transform: translate(-50%, -100%) rotate(315deg); }
  .petal:nth-child(16) { transform: translate(-50%, -100%) rotate(337.5deg); }

  .petal:nth-child(odd) { animation-delay: 0.3s; }
  .petal:nth-child(even) { animation-delay: 0.6s; }

  .center {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 110px;
    height: 110px;
    background: radial-gradient(circle at 35% 35%, #8a5a2c, #6b4423 70%);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    box-shadow:
      inset 0 0 15px rgba(0,0,0,0.4),
      0 4px 10px rgba(0,0,0,0.2);
    z-index: 2;
    background-image:
      radial-gradient(circle, #4f2f17 2px, transparent 3px);
    background-size: 12px 12px;
  }

  .stem {
    width: 12px;
    height: 90px;
    background: linear-gradient(180deg, #5fa84a, #3f7d31);
    margin: -5px auto 0;
    border-radius: 6px;
    position: relative;
    z-index: 1;
    animation: stemSway 4s ease-in-out infinite;
    transform-origin: top center;
  }

  @keyframes stemSway {
    0%, 100% { transform: rotate(-2deg); }
    50% { transform: rotate(2deg); }
  }

  .leaf {
    position: absolute;
    width: 35px;
    height: 18px;
    background: linear-gradient(135deg, #6fc24f, #3f7d31);
    border-radius: 0 50% 0 50%;
    top: 30px;
  }

  .leaf.left {
    left: -30px;
    transform: rotate(20deg);
  }

  .leaf.right {
    right: -30px;
    transform: rotate(-20deg) scaleX(-1);
  }

  .thanks-text {
    margin-top: 25px;
    font-size: 1.8rem;
    color: var(--pink-dark);
    font-family: 'Brush Script MT', cursive, 'Segoe UI', sans-serif;
    font-style: italic;
    text-align: center;
    text-shadow: 1px 2px 4px rgba(255, 142, 173, 0.4);
    animation: appearText 1s ease forwards;
    opacity: 0;
  }

  @keyframes appearText {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .small-note {
    margin-top: 8px;
    font-size: 0.95rem;
    color: #b96b86;
  }

  @media (max-width: 420px) {
    .card { padding: 40px 25px; }
    .card h1 { font-size: 1.6rem; }
    .sunflower { width: 200px; height: 200px; }
    .thanks-text { font-size: 1.4rem; }
  }
</style>
</head>
<body>

<!-- Pantalla 1 -->
<div class="card" id="card">
  <span class="emoji">🥺</span>
  <h1>¿Me perdonas?</h1>
  <div class="buttons-row">
    <button id="btn-yes">Sí</button>
    <button id="btn-no">No</button>
  </div>
</div>

<!-- Pantalla 2: Sorpresa -->
<div class="surprise-screen" id="surprise">
  <div class="sunflower-wrapper">
    <div class="sunflower">
      <div class="petals">
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
      </div>
      <div class="center"></div>
    </div>
    <div class="stem">
      <div class="leaf left"></div>
      <div class="leaf right"></div>
    </div>
    <p class="thanks-text">gracias por perdonarme 💕</p>
    <p class="small-note">en un momento te llevo a WhatsApp...</p>
  </div>
</div>

<script>
  const card = document.getElementById('card');
  const surprise = document.getElementById('surprise');
  const btnYes = document.getElementById('btn-yes');
  const btnNo = document.getElementById('btn-no');

  const WHATSAPP_URL = "https://api.whatsapp.com/send/?phone=%2B58424694133&text=Sebastian%20te%20perdono&type=phone_number&app_absent=0";

  // ---------- Corazones flotantes de fondo ----------
  function createHearts() {
    const hearts = ['💗', '💕', '🌸', '💖'];
    setInterval(() => {
      const heart = document.createElement('span');
      heart.classList.add('heart');
      heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = (4 + Math.random() * 4) + 's';
      heart.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 9000);
    }, 600);
  }
  createHearts();

  // ---------- Lógica del botón "No" escurridizo ----------
  function escapeButton() {
    const btnWidth = btnNo.offsetWidth;
    const btnHeight = btnNo.offsetHeight;
    const margin = 10;

    const maxX = window.innerWidth - btnWidth - margin;
    const maxY = window.innerHeight - btnHeight - margin;

    const randomX = Math.random() * Math.max(maxX, margin) + margin / 2;
    const randomY = Math.random() * Math.max(maxY, margin) + margin / 2;

    if (!btnNo.classList.contains('escaping')) {
      btnNo.classList.add('escaping');
    }

    btnNo.style.left = randomX + 'px';
    btnNo.style.top = randomY + 'px';
  }

  // Escapa al pasar el mouse (desktop)
  btnNo.addEventListener('mouseenter', escapeButton);

  // Escapa al intentar tocar en móvil (antes del click real)
  btnNo.addEventListener('touchstart', function (e) {
    e.preventDefault();
    escapeButton();
  }, { passive: false });

  // Si por azar logran hacer click, se comporta igual que "Sí"
  btnNo.addEventListener('click', goToSurprise);
  btnYes.addEventListener('click', goToSurprise);

  // Reposiciona si cambia el tamaño de ventana mientras escapa
  window.addEventListener('resize', () => {
    if (btnNo.classList.contains('escaping')) {
      escapeButton();
    }
  });

  // ---------- Transición a la pantalla de sorpresa ----------
  function goToSurprise() {
    card.classList.add('hide');

    setTimeout(() => {
      card.style.display = 'none';
      surprise.classList.add('show');

      // 2 segundos después de aparecer el girasol, abrir WhatsApp
      setTimeout(() => {
        window.open(WHATSAPP_URL, '_blank');
      }, 2000);
    }, 700);
  }
</script>

</body>
</html>
